<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>السبورة الذكية السحرية - AR Drawing</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial', sans-serif; }
        canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; transform: scaleX(-1); }
        video { display: none; }
        
        #controls {
            position: absolute; left: 20px; top: 20px; width: 220px;
            background: rgba(0, 0, 0, 0.85); border: 2px solid #00d2ff;
            padding: 15px; border-radius: 15px; z-index: 100; color: white;
        }
        input, select { width: 100%; margin-top: 10px; padding: 5px; border-radius: 5px; }
        .info { font-size: 12px; color: #00d2ff; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

<div id="controls">
    <h3 style="margin:0; font-size: 16px;">إعدادات الفرشاة</h3>
    <input type="text" id="name-to-draw" placeholder="اكتب الاسم هنا..." value="Gemini">
    <select id="color-mode">
        <option value="rainbow">ألوان قوس قزح 🌈</option>
        <option value="cyan">أزرق سماوي ❄️</option>
        <option value="gold">ذهبي ✨</option>
    </select>
    <div class="info">
        👌 اطبق للتحكم بالحجم <br>
        👎 اقلب يدك لمسح السبورة
    </div>
</div>

<video id="input_video"></video>
<canvas id="output_canvas"></canvas>

<script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const ctx = canvasElement.getContext('2d');

    // مصفوفة لتخزين النقاط المرسومة (السبورة)
    let drawingPoints = [];
    let hue = 0;

    function onResults(results) {
        // ضبط أبعاد الكانفاس
        if (canvasElement.width !== window.innerWidth) {
            canvasElement.width = window.innerWidth;
            canvasElement.height = window.innerHeight;
        }

        ctx.save();
        ctx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        
        // رسم خلفية الكاميرا
        ctx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

        if (results.multiHandLandmarks) {
            for (const landmarks of results.multiHandLandmarks) {
                const thumb = landmarks[4];
                const index = landmarks[8];
                const pinky = landmarks[20];
                const wrist = landmarks[0];

                // 1. كشف إشارة المسح (👎)
                // إذا كان الإبهام أسفل المعصم بشكل واضح
                if (thumb.y > wrist.y && Math.abs(thumb.x - wrist.x) < 0.2) {
                    drawingPoints = []; // مسح كل شيء
                    continue;
                }

                // 2. حساب المركز والحجم (Pinch)
                const centerX = ((thumb.x + index.x) / 2) * canvasElement.width;
                const centerY = ((thumb.y + index.y) / 2) * canvasElement.height;
                const distance = Math.hypot(thumb.x - index.x, thumb.y - index.y);
                
                // الحجم: يكبر عند الفتح ويصغر عند الطبق
                const fontSize = distance * 500; 

                // 3. إضافة نقطة رسم جديدة إذا كانت اليد قريبة من وضعية الكتابة
                if (distance < 0.1) {
                    const text = document.getElementById('name-to-draw').value;
                    const mode = document.getElementById('color-mode').value;
                    let color;
                    
                    if (mode === 'rainbow') {
                        color = `hsl(${hue}, 100%, 50%)`;
                        hue = (hue + 5) % 360;
                    } else if (mode === 'cyan') color = '#00d2ff';
                    else color = '#ffd700';

                    drawingPoints.push({ x: centerX, y: centerY, text, color, size: fontSize });
                }
            }
        }

        // 4. رسم كل النقاط المخزنة (تأثير السبورة)
        drawingPoints.forEach(p => {
            ctx.fillStyle = p.color;
            ctx.font = `bold ${p.size}px Arial`;
            ctx.fillText(p.text, p.x, p.y);
        });

        ctx.restore();
    }

    const hands = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
        maxNumHands: 2,
        modelComplexity: 1,
        minDetectionConfidence: 0.7,
        minTrackingConfidence: 0.7
    });

    hands.onResults(onResults);

    const camera = new Camera(videoElement, {
        onFrame: async () => { await hands.send({image: videoElement}); },
        width: 1280, height: 720
    });
    camera.start();

    // منع اختفاء الرسم عند تغيير حجم النافذة
    window.addEventListener('resize', () => {
        canvasElement.width = window.innerWidth;
        canvasElement.height = window.innerHeight;
    });
</script>
</body>
</html>
