<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>عالم الرسم الذكي للأطفال 🎨✨</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; transform: scaleX(-1); }
        video { display: none; }
        
        #ui-layer {
            position: absolute; top: 20px; width: 100%;
            display: flex; justify-content: center; gap: 30px;
            z-index: 100; pointer-events: none;
        }
        .tool-icon {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 15px 25px; border-radius: 25px;
            font-size: 35px; border: 3px solid rgba(255,255,255,0.5);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: white; display: flex; align-items: center; gap: 10px;
        }
        .active-tool { 
            transform: scale(1.1); 
            border-color: #00f2ff; 
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.5);
            background: rgba(0, 242, 255, 0.2);
        }
    </style>
</head>
<body>

<div id="ui-layer">
    <div id="btn-pen" class="tool-icon">✏️ <span>قلم سحري</span></div>
    <div id="btn-eraser" class="tool-icon">🧽 <span>ممحاة</span></div>
</div>

<video id="input_video"></video>
<canvas id="output_canvas"></canvas>

<script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');

    let allPaths = []; // تخزين كل الخطوط المرسومة
    let handStates = {}; // تخزين حالة كل يد بشكل منفصل باستخدام Label (Left/Right)
    let hue = 0; // لعمل تأثير الـ RGB

    // إعداد العناصر (نار، ماء، هواء)
    const elements = {
        'fire': { color: '255, 100, 0' },
        'water': { color: '0, 150, 255' },
        'air': { color: '150, 255, 150' }
    };

    function playSound(freq) {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.1);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }

    function onResults(results) {
        canvasElement.width = window.innerWidth;
        canvasElement.height = window.innerHeight;
        canvasCtx.save();
        
        // 1. رسم فيديو الكاميرا
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

        // 2. تحديث لون الـ RGB
        hue = (hue + 2) % 360;
        const rainbowColor = `hsl(${hue}, 100%, 50%)`;

        // 3. رسم الخطوط المخزنة (الرسم الثابت)
        allPaths.forEach(path => {
            if (path.points.length < 2) return;
            canvasCtx.beginPath();
            canvasCtx.strokeStyle = path.color;
            canvasCtx.lineWidth = path.width;
            canvasCtx.lineCap = 'round';
            canvasCtx.lineJoin = 'round';
            canvasCtx.moveTo(path.points[0].x, path.points[0].y);
            for (let i = 1; i < path.points.length; i++) {
                canvasCtx.lineTo(path.points[i].x, path.points[i].y);
            }
            canvasCtx.stroke();
        });

        // 4. معالجة الأيدي الظاهرة
        if (results.multiHandLandmarks && results.multiHandedness) {
            results.multiHandLandmarks.forEach((landmarks, index) => {
                // استخدام الـ Label (Left/Right) كمعرف فريد مبدئي لتجنب التداخل بين شخصين
                const handId = results.multiHandedness[index].label + index; 
                
                if (!handStates[handId]) {
                    handStates[handId] = { mode: 'elements', currentElem: 'fire', isDrawing: false, lastPathIdx: -1 };
                }

                const state = handStates[handId];
                const x = landmarks[8].x * canvasElement.width;
                const y = landmarks[8].y * canvasElement.height;
                const thumbTip = landmarks[4];
                const indexTip = landmarks[8];
                
                // حساب المسافة للقرص (Pinch)
                const distance = Math.hypot(thumbTip.x - indexTip.x, thumbTip.y - indexTip.y);
                const isPinching = distance < 0.05;

                // تحديث واجهة المستخدم (Buttons)
                document.getElementById('btn-pen').classList.toggle('active-tool', state.mode === 'pen');
                document.getElementById('btn-eraser').classList.toggle('active-tool', state.mode === 'eraser');

                // التغيير بين الأوضاع عند لمس أعلى الشاشة
                if (y < 100) {
                    if (x < canvasElement.width * 0.5) state.mode = 'pen';
                    else state.mode = 'eraser';
                }

                if (state.mode === 'pen') {
                    if (isPinching) {
                        if (!state.isDrawing) {
                            state.isDrawing = true;
                            const newPath = { color: rainbowColor, width: 8, points: [{x, y}] };
                            allPaths.push(newPath);
                            state.lastPathIdx = allPaths.length - 1;
                        } else if (state.lastPathIdx !== -1) {
                            allPaths[state.lastPathIdx].points.push({x, y});
                        }
                    } else {
                        state.isDrawing = false;
                        state.lastPathIdx = -1;
                    }
                    // مؤشر القلم
                    canvasCtx.font = "30px Arial";
                    canvasCtx.fillText("✏️", x - 15, y - 15);
                } 
                else if (state.mode === 'eraser') {
                    if (isPinching) {
                        // مسح ذكي: إزالة النقاط القريبة من الممحاة بدلاً من الخطوط الكاملة
                        allPaths.forEach(path => {
                            path.points = path.points.filter(p => Math.hypot(p.x - x, p.y - y) > 40);
                        });
                        // تنظيف المسارات الفارغة
                        allPaths = allPaths.filter(path => path.points.length > 1);
                    }
                    canvasCtx.fillText("🧽", x - 15, y - 15);
                } 
                else {
                    // وضع العناصر (نار/ماء) - يختفي عند تفعيل القلم أو الممحاة تلقائياً
                    const color = elements[state.currentElem].color;
                    canvasCtx.fillStyle = `rgba(${color}, 0.6)`;
                    canvasCtx.beginPath();
                    canvasCtx.arc(x, y, 20 + (distance * 200), 0, Math.PI * 2);
                    canvasCtx.fill();
                }
            });
        }

        canvasCtx.restore();
    }

    const hands = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
        maxNumHands: 4, // دعم حتى 4 أيدي (شخصين)
        modelComplexity: 1,
        minDetectionConfidence: 0.8,
        minTrackingConfidence: 0.8
    });

    hands.onResults(onResults);

    const camera = new Camera(videoElement, {
        onFrame: async () => { await hands.send({image: videoElement}); },
        width: 1280, height: 720
    });
    camera.start();
</script>
</body>
</html>
