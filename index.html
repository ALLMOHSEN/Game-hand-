<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>الرسم السحري - نسخة الممحاة الاحترافية 🎨</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; transform: scaleX(-1); }
        video { display: none; }
        #ui-layer {
            position: absolute; top: 20px; width: 100%;
            display: flex; justify-content: center; gap: 20px; z-index: 100;
        }
        .tool-icon {
            background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(10px);
            padding: 10px 20px; border-radius: 15px; font-size: 25px;
            color: white; border: 2px solid #fff; pointer-events: none;
        }
        .active { border-color: #00f2ff; background: rgba(0, 242, 255, 0.3); }
    </style>
</head>
<body>

<div id="ui-layer">
    <div id="btn-pen" class="tool-icon">✏️ قلم RGB</div>
    <div id="btn-eraser" class="tool-icon">🧽 ممحاة سحرية</div>
</div>

<video id="input_video"></video>
<canvas id="output_canvas"></canvas>

<script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');

    let allPaths = []; 
    let handStates = {}; 
    let hue = 0;

    function onResults(results) {
        canvasElement.width = window.innerWidth;
        canvasElement.height = window.innerHeight;
        canvasCtx.save();
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

        hue = (hue + 3) % 360;
        const rainbowColor = `hsl(${hue}, 100%, 50%)`;

        // رسم الخطوط
        allPaths.forEach(path => {
            if (path.points.length < 2) return;
            canvasCtx.beginPath();
            canvasCtx.strokeStyle = path.color;
            canvasCtx.lineWidth = 10;
            canvasCtx.lineCap = 'round';
            canvasCtx.lineJoin = 'round';
            canvasCtx.moveTo(path.points[0].x, path.points[0].y);
            for (let i = 1; i < path.points.length; i++) {
                canvasCtx.lineTo(path.points[i].x, path.points[i].y);
            }
            canvasCtx.stroke();
        });

        if (results.multiHandLandmarks) {
            results.multiHandLandmarks.forEach((landmarks, index) => {
                const handId = index; 
                if (!handStates[handId]) {
                    handStates[handId] = { mode: 'pen', isDrawing: false, lastPathIdx: -1 };
                }

                const state = handStates[handId];
                const x = landmarks[8].x * canvasElement.width;
                const y = landmarks[8].y * canvasElement.height;
                const isPinching = Math.hypot(landmarks[4].x - landmarks[8].x, landmarks[4].y - landmarks[8].y) < 0.05;

                // تحديث الواجهة
                document.getElementById('btn-pen').classList.toggle('active', state.mode === 'pen');
                document.getElementById('btn-eraser').classList.toggle('active', state.mode === 'eraser');

                if (y < 100) {
                    state.mode = (x < canvasElement.width / 2) ? 'pen' : 'eraser';
                }

                if (state.mode === 'pen') {
                    if (isPinching) {
                        if (!state.isDrawing) {
                            state.isDrawing = true;
                            const newPath = { color: rainbowColor, points: [{x, y}] };
                            allPaths.push(newPath);
                            state.lastPathIdx = allPaths.length - 1;
                        } else {
                            allPaths[state.lastPathIdx].points.push({x, y});
                        }
                    } else {
                        state.isDrawing = false;
                    }
                    canvasCtx.fillText("✏️", x - 15, y - 15);
                } 
                
                else if (state.mode === 'eraser') {
                    if (isPinching) {
                        let newAllPaths = [];
                        allPaths.forEach(path => {
                            let currentSubPath = [];
                            path.points.forEach(p => {
                                // إذا كانت النقطة بعيدة عن الممحاة، أضفها للمسار الحالي
                                if (Math.hypot(p.x - x, p.y - y) > 35) {
                                    currentSubPath.push(p);
                                } else {
                                    // إذا لمسنا نقطة، ننهي المسار الحالي ونبدأ واحداً جديداً (تقسيم الخط)
                                    if (currentSubPath.length > 1) {
                                        newAllPaths.push({ color: path.color, points: currentSubPath });
                                    }
                                    currentSubPath = [];
                                }
                            });
                            if (currentSubPath.length > 1) {
                                newAllPaths.push({ color: path.color, points: currentSubPath });
                            }
                        });
                        allPaths = newAllPaths;
                    }
                    canvasCtx.fillText("🧽", x - 15, y - 15);
                }
            });
        }
        canvasCtx.restore();
    }

    const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
    hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.8 });
    hands.onResults(onResults);

    new Camera(videoElement, {
        onFrame: async () => { await hands.send({image: videoElement}); },
        width: 1280, height: 720
    }).start();
</script>
</body>
</html>
