<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تحكم العناصر للأطفال 🎈</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; transform: scaleX(-1); }
        video { display: none; }
        #hint-overlay {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            color: #fff; text-align: center; z-index: 10;
            background: linear-gradient(45deg, #ff0099, #493240); 
            padding: 15px 30px; border-radius: 50px;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="hint-overlay">حرك يدك والعب بالألوان! ✨ 🎈</div>

<video id="input_video"></video>
<canvas id="output_canvas"></canvas>

<script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');

    // إعداد الصور (تأكد من صحة اسم الملف)
    const elements = {
        'fire': { src: 'Photoroom_20260309_185127.png', color: '255, 150, 50', img: new Image() },
        'water': { src: 'Photoroom_20260309_185127.png', color: '50, 200, 255', img: new Image() },
        'air': { src: 'Photoroom_20260309_185127.png', color: '200, 255, 200', img: new Image() }
    };

    for (let key in elements) { elements[key].img.src = elements[key].src; }

    let particles = [];
    const elementKeys = Object.keys(elements);
    const handStates = {};

    // --- نظام أصوات الأطفال (نغمات مرحة) ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    function playKidSound(type) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        // نغمات مختلفة لكل عنصر (مثل أصوات ألعاب الفيديو)
        const notes = { 'fire': 440, 'water': 660, 'air': 880 };
        const freq = notes[type] || 440;

        osc.type = 'triangle'; // صوت ناعم ومريح للأذن
        osc.frequency.setValueAtTime(freq + (Math.random() * 100), audioCtx.currentTime);
        
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
        
        osc.start();
        osc.stop(audioCtx.currentTime + 0.2);
    }

    class Particle {
        constructor(x, y, color, size) {
            this.x = x; this.y = y;
            this.size = size * (Math.random() * 0.8 + 0.5);
            this.speedX = (Math.random() - 0.5) * 12;
            this.speedY = (Math.random() - 0.5) * 12;
            this.color = color;
            this.life = 1.0;
        }
        update() {
            this.x += this.speedX; this.y += this.speedY;
            this.life -= 0.02;
        }
        draw() {
            canvasCtx.fillStyle = `rgba(${this.color}, ${this.life})`;
            canvasCtx.beginPath();
            // رسم دوائر تشبه الفقاعات
            canvasCtx.arc(this.x, this.y, Math.max(0, this.size), 0, Math.PI * 2);
            canvasCtx.fill();
        }
    }

    function onResults(results) {
        canvasElement.width = window.innerWidth;
        canvasElement.height = window.innerHeight;
        canvasCtx.save();
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

        if (results.multiHandLandmarks) {
            results.multiHandLandmarks.forEach((landmarks, index) => {
                if (!handStates[index]) {
                    handStates[index] = { currentElement: 'fire', lastRotation: 0, lastSoundTime: 0 };
                }

                const middleRoot = landmarks[9];
                const wrist = landmarks[0];
                const thumbTip = landmarks[4];
                const indexTip = landmarks[8];
                
                const pinchDist = Math.hypot(thumbTip.x - indexTip.x, thumbTip.y - indexTip.y);
                const effectSize = pinchDist * 500;
                const angle = Math.atan2(middleRoot.y - wrist.y, middleRoot.x - wrist.x) * 180 / Math.PI;

                // تبديل العنصر
                if (Math.abs(angle - handStates[index].lastRotation) > 50) {
                    const currentIdx = elementKeys.indexOf(handStates[index].currentElement);
                    handStates[index].currentElement = elementKeys[(currentIdx + 1) % elementKeys.length];
                    handStates[index].lastRotation = angle;
                }

                const centerX = middleRoot.x * canvasElement.width;
                const centerY = middleRoot.y * canvasElement.height;
                const currentData = elements[handStates[index].currentElement];

                // رسم الصورة
                if (currentData.img.complete) {
                    canvasCtx.save();
                    canvasCtx.translate(centerX, centerY - 100);
                    canvasCtx.scale(-1, 1);
                    canvasCtx.shadowBlur = 30;
                    canvasCtx.shadowColor = `rgb(${currentData.color})`;
                    canvasCtx.drawImage(currentData.img, -50, -50, 100, 100);
                    canvasCtx.restore();
                }

                // إطلاق الجسيمات
                for (let i = 0; i < 5; i++) {
                    particles.push(new Particle(centerX, centerY, currentData.color, effectSize));
                }

                // تشغيل الصوت بتردد هادئ (مرة كل 150 ملي ثانية لكي لا يزعج الأطفال)
                const now = Date.now();
                if (now - handStates[index].lastSoundTime > 150 && effectSize > 20) {
                    playKidSound(handStates[index].currentElement);
                    handStates[index].lastSoundTime = now;
                }
            });
        }

        particles = particles.filter(p => p.life > 0);
        particles.forEach(p => { p.update(); p.draw(); });
        canvasCtx.restore();
    }

    const hands = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
        maxNumHands: 4,
        modelComplexity: 1,
        minDetectionConfidence: 0.6,
        minTrackingConfidence: 0.6
    });

    hands.onResults(onResults);

    const camera = new Camera(videoElement, {
        onFrame: async () => { await hands.send({image: videoElement}); },
        width: 1280, height: 720
    });
    camera.start();
</script>
</body>
</html>
