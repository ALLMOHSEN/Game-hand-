<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title> almohsen </title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; transform: scaleX(-1); }
        video { display: none; }
        #toolbar {
            position: absolute; top: 20px; width: 100%;
            display: flex; justify-content: center; gap: 15px; z-index: 100;
        }
        .icon-box {
            background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(15px);
            padding: 12px 25px; border-radius: 50px; border: 2px solid #fff;
            color: white; font-size: 20px; transition: 0.3s;
        }
        .active { background: #00f2ff; border-color: #fff; transform: scale(1.1); color: #000; }
    </style>
</head>
<body>

<div id="toolbar">
    <div id="btn-pen" class="icon-box">✏️ قلم</div>
    <div id="btn-eraser" class="icon-box">🧽 ممحاة</div>
    <div id="btn-elem" class="icon-box">🔥 عناصر</div>
</div>

<video id="input_video"></video>
<canvas id="output_canvas"></canvas>

<script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');

    let allPaths = [];
    let handStates = {};
    let hue = 0;

    // نظام الصوت الموسيقي
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx;
    
    function initAudio() {
        if (!audioCtx) audioCtx = new AudioContext();
    }

    function playSound(f) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(f, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.4);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.4);
    }

    function onResults(results) {
        initAudio(); // تفعيل الصوت عند أول حركة
        canvasElement.width = window.innerWidth;
        canvasElement.height = window.innerHeight;
        canvasCtx.save();
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

        hue = (hue + 2) % 360;

        // رسم الخطوط المخزنة
        allPaths.forEach(path => {
            if (path.points.length < 2) return;
            canvasCtx.beginPath();
            canvasCtx.strokeStyle = path.color;
            canvasCtx.lineWidth = 10;
            canvasCtx.lineCap = 'round';
            canvasCtx.moveTo(path.points[0].x, path.points[0].y);
            path.points.forEach(p => canvasCtx.lineTo(p.x, p.y));
            canvasCtx.stroke();
        });

        if (results.multiHandLandmarks) {
            results.multiHandLandmarks.forEach((landmarks, index) => {
                if (!handStates[index]) handStates[index] = { mode: 'elem', lastSound: 0 };
                const state = handStates[index];

                const tip = landmarks[8]; // رأس السبابة
                const x = tip.x * canvasElement.width;
                const y = tip.y * canvasElement.height;
                
                // حساب انفتاح اليد (لتحجيم العناصر)
                const openness = Math.hypot(landmarks[4].x - landmarks[20].x, landmarks[4].y - landmarks[20].y);
                const size = openness * 350;

                // تغيير الوضع بواسطة السبابة في الأعلى
                if (y < 100) {
                    if (x < canvasElement.width * 0.35) state.mode = 'pen';
                    else if (x > canvasElement.width * 0.65) state.mode = 'elem';
                    else state.mode = 'eraser';
                }

                // تحديث الألوان في الأيقونات
                document.getElementById('btn-pen').className = 'icon-box ' + (state.mode === 'pen' ? 'active' : '');
                document.getElementById('btn-eraser').className = 'icon-box ' + (state.mode === 'eraser' ? 'active' : '');
                document.getElementById('btn-elem').className = 'icon-box ' + (state.mode === 'elem' ? 'active' : '');

                if (state.mode === 'elem') {
                    // رسم كرة الطاقة (تظهر الآن بشكل مؤكد)
                    const grad = canvasCtx.createRadialGradient(x, y, 0, x, y, size);
                    grad.addColorStop(0, 'rgba(255, 100, 0, 0.9)'); // لون النار كمثال
                    grad.addColorStop(0.5, 'rgba(255, 50, 0, 0.4)');
                    grad.addColorStop(1, 'rgba(255, 0, 0, 0)');
                    
                    canvasCtx.fillStyle = grad;
                    canvasCtx.beginPath();
                    canvasCtx.arc(x, y, size, 0, Math.PI * 2);
                    canvasCtx.fill();

                    if (size > 50 && Date.now() - state.lastSound > 400) {
                        playSound(300 + size);
                        state.lastSound = Date.now();
                    }
                } else {
                    const isPinching = Math.hypot(landmarks[8].x - landmarks[4].x, landmarks[8].y - landmarks[4].y) < 0.04;
                    
                    if (state.mode === 'pen') {
                        if (isPinching) {
                            if (!state.drawing) {
                                state.drawing = true;
                                allPaths.push({ color: `hsl(${hue}, 100%, 50%)`, points: [{x, y}] });
                                state.pathIdx = allPaths.length - 1;
                                playSound(600);
                            } else {
                                allPaths[state.pathIdx].points.push({x, y});
                            }
                        } else state.drawing = false;
                        canvasCtx.fillText("✏️", x - 20, y - 20);
                    } 
                    else if (state.mode === 'eraser') {
                        if (isPinching) {
                            allPaths.forEach(path => {
                                path.points = path.points.filter(p => Math.hypot(p.x - x, p.y - y) > 40);
                            });
                            allPaths = allPaths.filter(p => p.points.length > 1);
                        }
                        canvasCtx.fillText("🧽", x - 20, y - 20);
                    }
                }
            });
        }
        canvasCtx.restore();
    }

    const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
    hands.setOptions({ maxNumHands: 10, modelComplexity: 1, minDetectionConfidence: 0.7 });
    hands.onResults(onResults);

    new Camera(videoElement, {
        onFrame: async () => { await hands.send({image: videoElement}); },
        width: 1280, height: 720
    }).start();
</script>
</body>
</html>
