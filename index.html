<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Almohsen - Optimized Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; }
        video { display: none; }
        #toolbar {
            position: absolute; top: 20px; width: 100%;
            display: flex; justify-content: center; gap: 15px; z-index: 100;
        }
        .icon-box {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px);
            padding: 12px 25px; border-radius: 50px; border: 2px solid rgba(255,255,255,0.3);
            color: white; font-size: 18px; transition: 0.3s; cursor: pointer;
        }
        .active-pen { border-color: #00f2ff; background: rgba(0, 242, 255, 0.3); box-shadow: 0 0 15px #00f2ff; }
        .active-eraser { border-color: #ff4757; background: rgba(255, 71, 87, 0.3); box-shadow: 0 0 15px #ff4757; }
        .active-elem { border-color: #ffa502; background: rgba(255, 165, 2, 0.3); box-shadow: 0 0 15px #ffa502; }
    </style>
</head>
<body>

<div id="toolbar">
    <div id="btn-pen" class="icon-box">✏️ قلم (RGB)</div>
    <div id="btn-eraser" class="icon-box">🧽 ممحاة</div>
    <div id="btn-elem" class="icon-box">🎹 موسيقى</div>
</div>

<video id="input_video"></video>
<canvas id="output_canvas"></canvas>

<script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');

    let allPaths = [];
    let particles = [];
    let handStates = {};
    let globalHue = 0;
    let lastPoints = {}; // لتتبع آخر نقطة لكل يد لمنع استنزاف الذاكرة

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const scale = [261.63, 293.66, 329.63, 392.00, 440.00]; 

    function playNote(freq, vol) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine'; // صوت أنعم
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(vol * 0.1, audioCtx.currentTime + 0.05);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.8);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.8);
    }

    class Particle {
        constructor(x, y, hue) {
            this.x = x; this.y = y; this.hue = hue;
            this.size = Math.random() * 3 + 1;
            this.speedX = (Math.random() - 0.5) * 5;
            this.speedY = (Math.random() - 0.5) * 5;
            this.life = 1.0;
        }
        update() { this.x += this.speedX; this.y += this.speedY; this.life -= 0.04; }
        draw() {
            canvasCtx.fillStyle = `hsla(${this.hue}, 100%, 50%, ${this.life})`;
            canvasCtx.beginPath(); canvasCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2); canvasCtx.fill();
        }
    }

    function onResults(results) {
        // ضبط أبعاد الكانفاس لمرة واحدة أو عند التغيير فقط لتحسين الأداء
        if(canvasElement.width !== window.innerWidth) {
            canvasElement.width = window.innerWidth;
            canvasElement.height = window.innerHeight;
        }
        
        canvasCtx.save();
        canvasCtx.translate(canvasElement.width, 0);
        canvasCtx.scale(-1, 1);
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

        globalHue = (globalHue + 2) % 360; // سرعة دوران الألوان

        // رسم المسارات المخزنة
        canvasCtx.lineWidth = 8;
        canvasCtx.lineCap = 'round';
        canvasCtx.lineJoin = 'round';

        allPaths.forEach(path => {
            canvasCtx.beginPath();
            canvasCtx.strokeStyle = path.color;
            if(path.points.length > 0) {
                canvasCtx.moveTo(path.points[0].x, path.points[0].y);
                for(let i = 1; i < path.points.length; i++) {
                    canvasCtx.lineTo(path.points[i].x, path.points[i].y);
                }
                canvasCtx.stroke();
            }
        });

        if (results.multiHandLandmarks) {
            results.multiHandLandmarks.forEach((landmarks, index) => {
                if (!handStates[index]) handStates[index] = { mode: 'pen', drawing: false };
                const state = handStates[index];

                const tip = landmarks[8];
                const thumb = landmarks[4];
                const wrist = landmarks[0];
                
                const x = tip.x * canvasElement.width;
                const y = tip.y * canvasElement.height;
                const rawX = tip.x;

                // اختيار الوضع (تصحيح المنطق للمرآة)
                if (tip.y * canvasElement.height < 100) {
                    if (rawX < 0.3) state.mode = 'pen';
                    else if (rawX > 0.7) state.mode = 'elem';
                    else state.mode = 'eraser';
                }

                if(index === 0) {
                    document.getElementById('btn-pen').className = 'icon-box' + (state.mode === 'pen' ? ' active-pen' : '');
                    document.getElementById('btn-eraser').className = 'icon-box' + (state.mode === 'eraser' ? ' active-eraser' : '');
                    document.getElementById('btn-elem').className = 'icon-box' + (state.mode === 'elem' ? ' active-elem' : '');
                }

                const isPinching = Math.hypot(tip.x - thumb.x, tip.y - thumb.y) < 0.035;

                if (state.mode === 'elem') {
                    [4, 8, 12, 16, 20].forEach((fIdx, i) => {
                        const fTip = landmarks[fIdx];
                        const fx = fTip.x * canvasElement.width;
                        const fy = fTip.y * canvasElement.height;
                        const dist = Math.hypot(fTip.x - wrist.x, fTip.y - wrist.y);

                        if (dist > 0.15) { 
                            const size = dist * 120;
                            const g = canvasCtx.createRadialGradient(fx, fy, 0, fx, fy, size);
                            g.addColorStop(0, `hsla(${(globalHue + i*30)%360}, 100%, 60%, 0.6)`);
                            g.addColorStop(1, 'transparent');
                            canvasCtx.fillStyle = g;
                            canvasCtx.beginPath(); canvasCtx.arc(fx, fy, size, 0, Math.PI*2); canvasCtx.fill();
                            
                            if (Math.random() > 0.95) {
                                playNote(scale[i % scale.length], dist);
                                if(particles.length < 50) particles.push(new Particle(fx, fy, (globalHue + i*30)%360));
                            }
                        }
                    });
                } 
                else if (state.mode === 'pen' && isPinching) {
                    // التعديل الرئيسي: Throttling (تقليل النقاط)
                    const lastP = lastPoints[index] || {x: 0, y: 0};
                    const distMove = Math.hypot(x - lastP.x, y - lastP.y);

                    if (!state.drawing) {
                        state.drawing = true;
                        state.pathIdx = allPaths.length;
                        allPaths.push({ color: `hsl(${globalHue}, 100%, 50%)`, points: [{x, y}] });
                        lastPoints[index] = {x, y};
                    } else if (distMove > 4) { // سجل النقطة فقط إذا تحركت اليد مسافة كافية
                        allPaths[state.pathIdx].points.push({x, y});
                        lastPoints[index] = {x, y};
                    }
                } 
                else if (state.mode === 'eraser' && isPinching) {
                    // تحسين المسح: استخدام مصفوفة جديدة فقط عند الضرورة القصوى
                    let changed = false;
                    let nextPaths = [];
                    allPaths.forEach(path => {
                        let currentSegment = [];
                        path.points.forEach(p => {
                            if (Math.hypot(p.x - x, p.y - y) > 40) { // مساحة المسح
                                currentSegment.push(p);
                            } else {
                                changed = true;
                                if (currentSegment.length > 1) nextPaths.push({color: path.color, points: currentSegment});
                                currentSegment = [];
                            }
                        });
                        if (currentSegment.length > 1) nextPaths.push({color: path.color, points: currentSegment});
                    });
                    if(changed) allPaths = nextPaths;
                } else {
                    state.drawing = false;
                }
            });
        }

        // معالجة الجسيمات بذكاء
        particles = particles.filter(p => p.life > 0);
        particles.forEach(p => { p.update(); p.draw(); });
        
        canvasCtx.restore();
    }

    const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
    hands.setOptions({ 
        maxNumHands: 2, // تقليل عدد الأيدي يحسن الأداء جداً
        modelComplexity: 0, // 0 أسرع بكثير من 1 للأجهزة المتوسطة
        minDetectionConfidence: 0.6,
        minTrackingConfidence: 0.6 
    });
    hands.onResults(onResults);

    const camera = new Camera(videoElement, {
        onFrame: async () => { await hands.send({image: videoElement}); },
        width: 1280, height: 720
    });
    camera.start();
</script>
</body>
</html>
