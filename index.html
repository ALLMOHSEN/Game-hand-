<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مختبر العناصر السحري PRO 🧪✨</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; transform: scaleX(-1); }
        video { display: none; }
        #toolbar {
            position: absolute; top: 20px; width: 100%;
            display: flex; justify-content: center; gap: 15px; z-index: 100;
        }
        .icon-box {
            background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(15px);
            padding: 12px 25px; border-radius: 50px; border: 2px solid rgba(255,255,255,0.5);
            color: white; font-size: 18px; transition: 0.3s; pointer-events: none;
        }
        .active { background: rgba(0, 242, 255, 0.4); border-color: #00f2ff; transform: scale(1.1); box-shadow: 0 0 20px #00f2ff; }
    </style>
</head>
<body>

<div id="toolbar">
    <div id="btn-pen" class="icon-box">✏️ قلم RGB</div>
    <div id="btn-eraser" class="icon-box">🧽 ممحاة احترافية</div>
    <div id="btn-elem" class="icon-box">🌀 عناصر سحرية</div>
</div>

<video id="input_video"></video>
<canvas id="output_canvas"></canvas>

<script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');

    let allPaths = [];
    let particles = [];
    let handStates = {};
    let globalHue = 0;

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playMagicSound(f) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(f, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.3);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.3);
    }

    class Particle {
        constructor(x, y, hue) {
            this.x = x; this.y = y;
            this.hue = hue;
            this.size = Math.random() * 8 + 2;
            this.speedX = (Math.random() - 0.5) * 15;
            this.speedY = (Math.random() - 0.5) * 15;
            this.life = 1.0;
        }
        update() {
            this.x += this.speedX; this.y += this.speedY;
            this.life -= 0.02;
        }
        draw() {
            canvasCtx.fillStyle = `hsla(${this.hue}, 100%, 50%, ${this.life})`;
            canvasCtx.beginPath();
            canvasCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            canvasCtx.fill();
        }
    }

    function onResults(results) {
        canvasElement.width = window.innerWidth;
        canvasElement.height = window.innerHeight;
        canvasCtx.save();
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

        globalHue = (globalHue + 2) % 360;

        // رسم الخطوط
        allPaths.forEach(path => {
            if (path.points.length < 2) return;
            canvasCtx.beginPath();
            canvasCtx.strokeStyle = path.color;
            canvasCtx.lineWidth = 12;
            canvasCtx.lineCap = 'round';
            canvasCtx.lineJoin = 'round';
            canvasCtx.moveTo(path.points[0].x, path.points[0].y);
            path.points.forEach(p => canvasCtx.lineTo(p.x, p.y));
            canvasCtx.stroke();
        });

        if (results.multiHandLandmarks) {
            results.multiHandLandmarks.forEach((landmarks, index) => {
                if (!handStates[index]) handStates[index] = { mode: 'elem', drawing: false };
                const state = handStates[index];

                const tip = landmarks[8];
                const x = tip.x * canvasElement.width;
                const y = tip.y * canvasElement.height;
                const openness = Math.hypot(landmarks[4].x - landmarks[20].x, landmarks[4].y - landmarks[20].y);
                const isPinching = Math.hypot(landmarks[8].x - landmarks[4].x, landmarks[8].y - landmarks[4].y) < 0.04;
                
                // التحكم بالسبابة في الأعلى
                if (y < 100) {
                    if (x < canvasElement.width * 0.35) state.mode = 'pen';
                    else if (x > canvasElement.width * 0.65) state.mode = 'elem';
                    else state.mode = 'eraser';
                }

                document.getElementById('btn-pen').className = 'icon-box ' + (state.mode === 'pen' ? 'active' : '');
                document.getElementById('btn-eraser').className = 'icon-box ' + (state.mode === 'eraser' ? 'active' : '');
                document.getElementById('btn-elem').className = 'icon-box ' + (state.mode === 'elem' ? 'active' : '');

                if (state.mode === 'elem') {
                    const size = openness * 400;
                    // رسم كرة RGB متغيرة
                    const grad = canvasCtx.createRadialGradient(x, y, 0, x, y, size);
                    grad.addColorStop(0, `hsla(${globalHue}, 100%, 50%, 0.9)`);
                    grad.addColorStop(1, `hsla(${globalHue}, 100%, 50%, 0)`);
                    canvasCtx.fillStyle = grad;
                    canvasCtx.beginPath();
                    canvasCtx.arc(x, y, size, 0, Math.PI * 2);
                    canvasCtx.fill();

                    // إضافة جسيمات
                    if (openness > 0.1) {
                        for(let i=0; i<3; i++) particles.push(new Particle(x, y, globalHue));
                        if(Math.random() > 0.9) playMagicSound(200 + size);
                    }
                } else if (state.mode === 'pen') {
                    if (isPinching) {
                        if (!state.drawing) {
                            state.drawing = true;
                            allPaths.push({ color: `hsl(${globalHue}, 100%, 50%)`, points: [{x, y}] });
                            state.pathIdx = allPaths.length - 1;
                            playMagicSound(600);
                        } else {
                            allPaths[state.pathIdx].points.push({x, y});
                        }
                    } else state.drawing = false;
                    canvasCtx.fillText("✏️", x - 20, y - 20);
                } else if (state.mode === 'eraser') {
                    if (isPinching) {
                        let newPaths = [];
                        allPaths.forEach(path => {
                            let segment = [];
                            path.points.forEach(p => {
                                if (Math.hypot(p.x - x, p.y - y) > 40) {
                                    segment.push(p);
                                } else {
                                    if (segment.length > 1) newPaths.push({ color: path.color, points: segment });
                                    segment = [];
                                }
                            });
                            if (segment.length > 1) newPaths.push({ color: path.color, points: segment });
                        });
                        allPaths = newPaths;
                        if(Math.random() > 0.8) playMagicSound(150);
                    }
                    canvasCtx.fillText("🧽", x - 20, y - 20);
                }
            });
        }

        particles = particles.filter(p => p.life > 0);
        particles.forEach(p => { p.update(); p.draw(); });
        canvasCtx.restore();
    }

    const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
    hands.setOptions({ maxNumHands: 10, modelComplexity: 1, minDetectionConfidence: 0.7 });
    hands.onResults(onResults);

    new Camera(videoElement, {
        onFrame: async () => { await hands.send({image: videoElement}); },
        width: 1280, height: 720
    }).start();
</script>
</body>
</html>
