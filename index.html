<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AR Planet Hand Control</title>
<style>
body { margin:0; overflow:hidden; }
canvas { position:absolute; top:0; left:0; }
video {
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:0;
}
#label {
  position:absolute;
  top:20px;
  left:20px;
  color:white;
  z-index:2;
}
</style>
</head>
<body>

<video id="video" autoplay playsinline></video>
<div id="label">Planet: Earth</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
// ====== Three.js ======
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.z = 3;

const renderer = new THREE.WebGLRenderer({alpha:true, antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// اضاءة
scene.add(new THREE.AmbientLight(0xffffff, 0.7));
const light = new THREE.PointLight(0xffffff, 2);
light.position.set(5,5,5);
scene.add(light);

// ====== الكواكب ======
const loader = new THREE.TextureLoader();

const planets = [
  {name:"Mercury", tex:"https://threejs.org/examples/textures/planets/mercury.jpg"},
  {name:"Venus", tex:"https://threejs.org/examples/textures/planets/venus.jpg"},
  {name:"Earth", tex:"https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg"},
  {name:"Mars", tex:"https://threejs.org/examples/textures/planets/mars_1k_color.jpg"},
  {name:"Jupiter", tex:"https://threejs.org/examples/textures/planets/jupiter.jpg"},
  {name:"Saturn", tex:"https://threejs.org/examples/textures/planets/saturn.jpg"},
  {name:"Uranus", tex:"https://threejs.org/examples/textures/planets/uranus.jpg"},
  {name:"Neptune", tex:"https://threejs.org/examples/textures/planets/neptune.jpg"}
];

let index = 2;

const geo = new THREE.SphereGeometry(0.6,64,64);
const mat = new THREE.MeshStandardMaterial({
  map: loader.load(planets[index].tex)
});
const planet = new THREE.Mesh(geo,mat);
scene.add(planet);

// ====== انفجار ======
const count = 1200;
const arr = new Float32Array(count*3);

const pGeo = new THREE.BufferGeometry();
pGeo.setAttribute('position', new THREE.BufferAttribute(arr,3));

const pMat = new THREE.PointsMaterial({size:0.03, color:0xff6600});
const particles = new THREE.Points(pGeo,pMat);
scene.add(particles);

// ====== حالات ======
let explode = false;
let handDetected = false;
let lastX = 0;

// ====== تغيير الكوكب ======
function changePlanet(dir){
  index += dir;
  if(index < 0) index = planets.length-1;
  if(index >= planets.length) index = 0;

  mat.map = loader.load(planets[index].tex);
  mat.needsUpdate = true;

  document.getElementById("label").innerText =
    "Planet: " + planets[index].name;
}

// ====== الكامرة ======
const video = document.getElementById('video');

navigator.mediaDevices.getUserMedia({video:true})
.then(stream => video.srcObject = stream);

// ====== MediaPipe ======
const hands = new Hands({
  locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
  maxNumHands:1,
  minDetectionConfidence:0.7,
  minTrackingConfidence:0.7
});

function isOpen(hand){
  return hand[8].y < hand[6].y;
}

hands.onResults(results=>{
  if(results.multiHandLandmarks.length > 0){
    handDetected = true;

    const hand = results.multiHandLandmarks[0];
    explode = isOpen(hand);

    const x = hand[8].x;
    const y = hand[8].y;

    // تحريك الكوكب مع اليد
    planet.position.x = (x - 0.5) * 3;
    planet.position.y = -(y - 0.5) * 2;

    // تحريك الانفجار مع الكوكب
    particles.position.copy(planet.position);

    // تبديل الكوكب
    if(Math.abs(x - lastX) > 0.2){
      if(x > lastX) changePlanet(1);
      else changePlanet(-1);
      lastX = x;
    }

  } else {
    handDetected = false;
  }
});

// تشغيل الكامرة
const cam = new Camera(video,{
  onFrame: async ()=> await hands.send({image:video}),
  width:640,
  height:480
});
cam.start();

// ====== أنيميشن ======
function animate(){
  requestAnimationFrame(animate);

  planet.rotation.y += 0.01;

  if(handDetected){
    if(explode){
      planet.scale.set(0.3,0.3,0.3);

      const pos = pGeo.attributes.position.array;
      for(let i=0;i<count;i++){
        pos[i*3] += (Math.random()-0.5)*0.08;
        pos[i*3+1] += (Math.random()-0.5)*0.08;
        pos[i*3+2] += (Math.random()-0.5)*0.08;
      }
      pGeo.attributes.position.needsUpdate = true;

    } else {
      planet.scale.lerp(new THREE.Vector3(1,1,1),0.1);
    }

  } else {
    planet.scale.lerp(new THREE.Vector3(1,1,1),0.05);

    const pos = pGeo.attributes.position.array;
    for(let i=0;i<count;i++){
      pos[i*3] *= 0.9;
      pos[i*3+1] *= 0.9;
      pos[i*3+2] *= 0.9;
    }
    pGeo.attributes.position.needsUpdate = true;
  }

  renderer.render(scene,camera);
}
animate();
</script>

</body>
</html>
