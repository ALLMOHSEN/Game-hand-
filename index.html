<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Almohsen - Pro Magic Wall</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; }
        video { display: none; }
        #toolbar {
            position: absolute; top: 20px; width: 100%;
            display: flex; justify-content: center; gap: 15px; z-index: 100;
        }
        .icon-box {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px);
            padding: 12px 25px; border-radius: 50px; border: 2px solid rgba(255,255,255,0.3);
            color: white; font-size: 18px; transition: 0.3s;
        }
        .active { background: rgba(0, 242, 255, 0.3); border-color: #00f2ff; transform: scale(1.1); }
    </style>
</head>
<body>

<div id="toolbar">
    <div id="btn-pen" class="icon-box">✏️ قلم</div>
    <div id="btn-eraser" class="icon-box">🧽 ممحاة</div>
    <div id="btn-elem" class="icon-box">🎹 موسيقى</div>
</div>

<video id="input_video"></video>
<canvas id="output_canvas"></canvas>

<script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');

    let allPaths = [];
    let particles = [];
    let handStates = {};
    let globalHue = 0;

    // محرك الصوت المتقدم
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const scale = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25]; // C Major Pentatonic

    function playNote(freq, vol) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        osc.type = 'triangle'; 
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        
        gain.gain.setValueAtTime(0, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(vol * 0.1, audioCtx.currentTime + 0.05);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.8);
        
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.start();
        osc.stop(audioCtx.currentTime + 0.8);
    }

    class Particle {
        constructor(x, y, hue) {
            this.x = x; this.y = y;
            this.hue = hue;
            this.size = Math.random() * 4 + 1;
            this.speedX = (Math.random() - 0.5) * 6;
            this.speedY = (Math.random() - 0.5) * 6;
            this.life = 1.0;
        }
        update() { this.x += this.speedX; this.y += this.speedY; this.life -= 0.03; }
        draw() {
            canvasCtx.fillStyle = `hsla(${this.hue}, 100%, 50%, ${this.life})`;
            canvasCtx.beginPath(); canvasCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2); canvasCtx.fill();
        }
    }

    function onResults(results) {
        canvasElement.width = window.innerWidth;
        canvasElement.height = window.innerHeight;
        
        canvasCtx.save();
        // Mirror Effect
        canvasCtx.translate(canvasElement.width, 0);
        canvasCtx.scale(-1, 1);
        
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

        globalHue = (globalHue + 1) % 360;

        // رسم الخطوط
        allPaths.forEach(path => {
            canvasCtx.beginPath();
            canvasCtx.strokeStyle = path.color;
            canvasCtx.lineWidth = 10;
            canvasCtx.lineCap = 'round';
            canvasCtx.lineJoin = 'round';
            if(path.points.length > 0) {
                canvasCtx.moveTo(path.points[0].x, path.points[0].y);
                path.points.forEach(p => canvasCtx.lineTo(p.x, p.y));
                canvasCtx.stroke();
            }
        });

        if (results.multiHandLandmarks) {
            results.multiHandLandmarks.forEach((landmarks, index) => {
                if (!handStates[index]) handStates[index] = { mode: 'elem', drawing: false };
                const state = handStates[index];

                const tip = landmarks[8];
                const thumb = landmarks[4];
                const wrist = landmarks[0];
                const x = tip.x * canvasElement.width;
                const y = tip.y * canvasElement.height;

                // تحديث الواجهة (Mirror Aware)
                const uiX = canvasElement.width - x; 
                if (y < 100) {
                    if (uiX < canvasElement.width * 0.35) state.mode = 'pen';
                    else if (uiX > canvasElement.width * 0.65) state.mode = 'elem';
                    else state.mode = 'eraser';
                }

                // تطبيق الـ Active Class بصرياً
                document.getElementById('btn-pen').className = 'icon-box' + (state.mode === 'pen' ? ' active' : '');
                document.getElementById('btn-eraser').className = 'icon-box' + (state.mode === 'eraser' ? ' active' : '');
                document.getElementById('btn-elem').className = 'icon-box' + (state.mode === 'elem' ? ' active' : '');

                const isPinching = Math.hypot(tip.x - thumb.x, tip.y - thumb.y) < 0.04;

                if (state.mode === 'elem') {
                    [4, 8, 12, 16, 20].forEach((fIdx, i) => {
                        const fTip = landmarks[fIdx];
                        const fx = fTip.x * canvasElement.width;
                        const fy = fTip.y * canvasElement.height;
                        const dist = Math.hypot(fTip.x - wrist.x, fTip.y - wrist.y);

                        if (dist > 0.15) { // إذا كان الإصبع مفتوحاً
                            const size = dist * 120;
                            const g = canvasCtx.createRadialGradient(fx, fy, 0, fx, fy, size);
                            g.addColorStop(0, `hsla(${(globalHue+i*30)%360}, 100%, 60%, 0.8)`);
                            g.addColorStop(1, 'transparent');
                            canvasCtx.fillStyle = g;
                            canvasCtx.beginPath(); canvasCtx.arc(fx, fy, size, 0, Math.PI*2); canvasCtx.fill();
                            
                            if (Math.random() > 0.94) {
                                playNote(scale[i % scale.length], dist);
                                particles.push(new Particle(fx, fy, (globalHue+i*30)%360));
                            }
                        }
                    });
                } 
                else if (state.mode === 'pen' && isPinching) {
                    if (!state.drawing) {
                        state.drawing = true;
                        state.pathIdx = allPaths.length;
                        allPaths.push({ color: `hsl(${globalHue}, 100%, 50%)`, points: [{x, y}] });
                    } else {
                        allPaths[state.pathIdx].points.push({x, y});
                    }
                } 
                else if (state.mode === 'eraser' && isPinching) {
                    let nextPaths = [];
                    allPaths.forEach(path => {
                        let currentSegment = [];
                        path.points.forEach(p => {
                            if (Math.hypot(p.x - x, p.y - y) > 30) {
                                currentSegment.push(p);
                            } else {
                                if (currentSegment.length > 1) nextPaths.push({color: path.color, points: currentSegment});
                                currentSegment = [];
                            }
                        });
                        if (currentSegment.length > 1) nextPaths.push({color: path.color, points: currentSegment});
                    });
                    allPaths = nextPaths;
                } else {
                    state.drawing = false;
                }
            });
        }

        particles = particles.filter(p => p.life > 0);
        particles.forEach(p => { p.update(); p.draw(); });
        canvasCtx.restore();
    }

    const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
    hands.setOptions({ maxNumHands: 4, modelComplexity: 1, minDetectionConfidence: 0.7 });
    hands.onResults(onResults);

    new Camera(videoElement, {
        onFrame: async () => { await hands.send({image: videoElement}); },
        width: 1280, height: 720
    }).start();
</script>
</body>
</html>
