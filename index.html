<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة العناصر السحرية المتقدمة ✨</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; transform: scaleX(-1); }
        video { display: none; }
        #toolbar {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 20px; z-index: 20; background: rgba(0,0,0,0.6);
            padding: 10px 25px; border-radius: 50px; border: 2px solid #fff;
        }
        .tool { font-size: 30px; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; border-radius: 50%; transition: 0.3s; }
        .active-tool { background: #fff; box-shadow: 0 0 20px #fff; transform: scale(1.1); }
    </style>
</head>
<body>

<div id="toolbar">
    <div id="pen-tool" class="tool">✏️</div>
    <div id="element-tool" class="tool active-tool">🪄</div>
    <div id="eraser-tool" class="tool">🧼</div>
</div>

<video id="input_video"></video>
<canvas id="output_canvas"></canvas>

<script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const ctx = canvasElement.getContext('2d');

    // إنشاء كانفاس منفصل للرسم لكي لا نمسح الكاميرا
    const drawingCanvas = document.createElement('canvas');
    const dctx = drawingCanvas.getContext('2d');

    const elements = {
        'fire': { src: 'Photoroom_20260309_185127.png', color: '255, 100, 0', freq: 440, img: new Image() },
        'water': { src: 'Photoroom_20260309_185127.png', color: '0, 150, 255', freq: 660, img: new Image() },
        'air': { src: 'Photoroom_20260309_185127.png', color: '200, 255, 200', freq: 880, img: new Image() }
    };
    for (let k in elements) elements[k].img.src = elements[k].src;

    let currentMode = 'element'; // element, pen, eraser
    let hue = 0;
    const handStates = {};
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playSound(type) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(elements[type].freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
        osc.start(); osc.stop(audioCtx.currentTime + 0.2);
    }

    function onResults(results) {
        if (drawingCanvas.width !== canvasElement.width) {
            drawingCanvas.width = canvasElement.width = window.innerWidth;
            drawingCanvas.height = canvasElement.height = window.innerHeight;
        }

        ctx.save();
        ctx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        
        // 1. رسم فيديو الكاميرا كخلفية (لن يتأثر بالممحاة الآن)
        ctx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

        if (results.multiHandLandmarks) {
            results.multiHandLandmarks.forEach((landmarks, index) => {
                if (!handStates[index]) handStates[index] = { currentElement: 'fire', lastRot: 0, lastSnd: 0 };
                
                const idxTip = landmarks[8];
                const thmbTip = landmarks[4];
                const wrist = landmarks[0];
                const mid = landmarks[9];

                const x = idxTip.x * canvasElement.width;
                const y = idxTip.y * canvasElement.height;
                const isPinching = Math.hypot(idxTip.x - thmbTip.x, idxTip.y - thmbTip.y) < 0.05;

                // اختيار الأدوات
                if (y < 100 && isPinching) {
                    if (x > canvasElement.width * 0.6) currentMode = 'pen';
                    else if (x < canvasElement.width * 0.4) currentMode = 'eraser';
                    else currentMode = 'element';
                    
                    document.querySelectorAll('.tool').forEach(t => t.classList.remove('active-tool'));
                    document.getElementById(`${currentMode}-tool`).classList.add('active-tool');
                }

                // منطق تبديل العناصر (يعمل في كل الأنماط)
                const rot = Math.atan2(mid.y - wrist.y, mid.x - wrist.x) * 180 / Math.PI;
                if (Math.abs(rot - handStates[index].lastRot) > 50) {
                    const keys = Object.keys(elements);
                    const curIdx = keys.indexOf(handStates[index].currentElement);
                    handStates[index].currentElement = keys[(curIdx + 1) % keys.length];
                    handStates[index].lastRot = rot;
                    playSound(handStates[index].currentElement);
                }

                const curEl = elements[handStates[index].currentElement];

                // تنفيذ الرسم أو المسح على الكانفاس المنفصل
                if (isPinching) {
                    dctx.lineCap = 'round';
                    dctx.lineWidth = currentMode === 'eraser' ? 60 : 12;
                    
                    if (currentMode === 'pen') {
                        dctx.globalCompositeOperation = 'source-over';
                        dctx.strokeStyle = `hsl(${hue}, 100%, 50%)`;
                        if (handStates[index].lastX) {
                            dctx.beginPath();
                            dctx.moveTo(handStates[index].lastX, handStates[index].lastY);
                            dctx.lineTo(x, y);
                            dctx.stroke();
                        }
                        hue = (hue + 3) % 360;
                    } else if (currentMode === 'eraser') {
                        dctx.globalCompositeOperation = 'destination-out';
                        if (handStates[index].lastX) {
                            dctx.beginPath();
                            dctx.moveTo(handStates[index].lastX, handStates[index].lastY);
                            dctx.lineTo(x, y);
                            dctx.stroke();
                        }
                    }
                    
                    // صوت مستمر بسيط عند الرسم أو المسح
                    if (Date.now() - handStates[index].lastSnd > 150) {
                        playSound(handStates[index].currentElement);
                        handStates[index].lastSnd = Date.now();
                    }
                    handStates[index].lastX = x;
                    handStates[index].lastY = y;
                } else {
                    handStates[index].lastX = null;
                }

                // رسم شعار العنصر والجسيمات (دائماً تتبع اليد)
                ctx.save();
                ctx.translate(x, y - 60);
                ctx.scale(-1, 1);
                ctx.shadowBlur = 20;
                ctx.shadowColor = curEl.color;
                if (curEl.img.complete) ctx.drawImage(curEl.img, -35, -35, 70, 70);
                ctx.restore();
            });
        }

        // 2. دمج طبقة الرسم فوق الكاميرا
        ctx.drawImage(drawingCanvas, 0, 0);
        ctx.restore();
    }

    const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
    hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
    hands.onResults(onResults);

    const camera = new Camera(videoElement, {
        onFrame: async () => { await hands.send({image: videoElement}); },
        width: 1280, height: 720
    });
    camera.start();
</script>
</body>
</html>
