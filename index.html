<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Almohsen - Magic Music Wall</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; transform: scaleX(-1); }
        video { display: none; }
        #toolbar {
            position: absolute; top: 20px; width: 100%;
            display: flex; justify-content: center; gap: 15px; z-index: 100;
        }
        .icon-box {
            background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(15px);
            padding: 10px 20px; border-radius: 50px; border: 2px solid rgba(255,255,255,0.3);
            color: white; font-size: 18px; pointer-events: none;
        }
        .active-label { border-color: #00f2ff; background: rgba(0, 242, 255, 0.2); }
    </style>
</head>
<body>

<div id="toolbar">
    <div class="icon-box" id="l-pen">✏️ رسم</div>
    <div class="icon-box" id="l-eraser">🧽 مسح</div>
    <div class="icon-box" id="l-elem">🎹 موسيقى</div>
</div>

<video id="input_video"></video>
<canvas id="output_canvas"></canvas>

<script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');

    let allPaths = [];
    let particles = [];
    let handStates = {};
    let globalHue = 0;

    // إعداد النظام الصوتي
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const notes = [261.63, 293.66, 329.63, 349.23, 392.00]; // سلم C Major

    function playNote(freq, volume) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        osc.type = 'sine'; // صوت ناعم كالجرس
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        
        gain.gain.setValueAtTime(volume * 0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.5);
        
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.start();
        osc.stop(audioCtx.currentTime + 0.5);
    }

    class Particle {
        constructor(x, y, hue) {
            this.x = x; this.y = y;
            this.hue = hue;
            this.size = Math.random() * 5 + 2;
            this.speedX = (Math.random() - 0.5) * 8;
            this.speedY = (Math.random() - 0.5) * 8;
            this.life = 1.0;
        }
        update() { this.x += this.speedX; this.y += this.speedY; this.life -= 0.04; }
        draw() {
            canvasCtx.fillStyle = `hsla(${this.hue}, 100%, 50%, ${this.life})`;
            canvasCtx.beginPath(); canvasCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2); canvasCtx.fill();
        }
    }

    function onResults(results) {
        canvasElement.width = window.innerWidth;
        canvasElement.height = window.innerHeight;
        
        canvasCtx.save();
        // لإصلاح الـ Mirror وجعل الرسم يطابق حركة اليد في الكاميرا المقلوبة
        canvasCtx.translate(canvasElement.width, 0);
        canvasCtx.scale(-1, 1);
        
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

        globalHue = (globalHue + 1) % 360;

        // رسم الخطوط
        allPaths.forEach(path => {
            if (path.points.length < 2) return;
            canvasCtx.beginPath();
            canvasCtx.strokeStyle = path.color;
            canvasCtx.lineWidth = 8;
            canvasCtx.lineCap = 'round';
            canvasCtx.moveTo(path.points[0].x, path.points[0].y);
            path.points.forEach(p => canvasCtx.lineTo(p.x, p.y));
            canvasCtx.stroke();
        });

        if (results.multiHandLandmarks) {
            results.multiHandLandmarks.forEach((landmarks, index) => {
                if (!handStates[index]) handStates[index] = { mode: 'elem', drawing: false };
                const state = handStates[index];

                const wrist = landmarks[0]; // معصم اليد (الباطن)
                const fingersIndices = [8, 12, 16, 20, 4]; // أطراف الأصابع الخمسة
                
                // نقطة التحكم (السبابة)
                const controlX = landmarks[8].x * canvasElement.width;
                const controlY = landmarks[8].y * canvasElement.height;

                // تبديل الأنماط
                if (controlY < 100) {
                    if (controlX < canvasElement.width * 0.35) state.mode = 'pen';
                    else if (controlX > canvasElement.width * 0.65) state.mode = 'elem';
                    else state.mode = 'eraser';
                }

                // تنفيذ وضع الموسيقى والعناصر على كل الأصابع
                if (state.mode === 'elem') {
                    fingersIndices.forEach((fIdx, i) => {
                        const tip = landmarks[fIdx];
                        const tx = tip.x * canvasElement.width;
                        const ty = tip.y * canvasElement.height;
                        
                        // حساب المسافة بين الإصبع وباطن اليد (الرسغ)
                        const distToWrist = Math.hypot(tip.x - wrist.x, tip.y - wrist.y);
                        
                        // إذا كان الإصبع مفتوحاً (المسافة أكبر من 0.2)
                        if (distToWrist > 0.2) {
                            const size = distToWrist * 150;
                            const grad = canvasCtx.createRadialGradient(tx, ty, 0, tx, ty, size);
                            grad.addColorStop(0, `hsla(${(globalHue + i*40)%360}, 100%, 50%, 0.7)`);
                            grad.addColorStop(1, `transparent`);
                            
                            canvasCtx.fillStyle = grad;
                            canvasCtx.beginPath();
                            canvasCtx.arc(tx, ty, size, 0, Math.PI * 2);
                            canvasCtx.fill();

                            // عزف النوتة بناءً على قوة الفتح
                            if (Math.random() > 0.92) {
                                playNote(notes[i], distToWrist);
                                for(let p=0; p<2; p++) particles.push(new Particle(tx, ty, (globalHue + i*40)%360));
                            }
                        }
                    });
                } 
                else if (state.mode === 'pen') {
                    const isPinching = Math.hypot(landmarks[8].x - landmarks[4].x, landmarks[8].y - landmarks[4].y) < 0.04;
                    if (isPinching) {
                        if (!state.drawing) {
                            state.drawing = true;
                            allPaths.push({ color: `hsl(${globalHue}, 100%, 50%)`, points: [{x: controlX, y: controlY}] });
                            state.pathIdx = allPaths.length - 1;
                        } else {
                            allPaths[state.pathIdx].points.push({x: controlX, y: controlY});
                        }
                    } else state.drawing = false;
                }
                else if (state.mode === 'eraser') {
                    const isPinching = Math.hypot(landmarks[8].x - landmarks[4].x, landmarks[8].y - landmarks[4].y) < 0.04;
                    if (isPinching) {
                        allPaths = allPaths.filter(path => {
                            path.points = path.points.filter(p => Math.hypot(p.x - controlX, p.y - controlY) > 40);
                            return path.points.length > 1;
                        });
                    }
                }
            });
        }

        particles = particles.filter(p => p.life > 0);
        particles.forEach(p => { p.update(); p.draw(); });
        canvasCtx.restore();
    }

    const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
    hands.setOptions({ maxNumHands: 4, modelComplexity: 1, minDetectionConfidence: 0.7 });
    hands.onResults(onResults);

    new Camera(videoElement, {
        onFrame: async () => { await hands.send({image: videoElement}); },
        width: 1280, height: 720
    }).start();
</script>
</body>
</html>
