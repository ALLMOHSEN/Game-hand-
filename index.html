<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تحكم العناصر - شعارات PNG</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; transform: scaleX(-1); }
        video { display: none; }
        #hint-overlay {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            color: white; text-align: center; z-index: 10;
            background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 50px;
            font-family: sans-serif; pointer-events: none;
        }
    </style>
</head>
<body>

<div id="hint-overlay">دور يدك لتبديل قوة العنصر ✨</div>

<video id="input_video"></video>
<canvas id="output_canvas"></canvas>

<script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');

    // إعداد العناصر مع تحميل الصور
    const elements = {
        'fire': { src: 'Photoroom_20260309_185127.png', color: '255, 100, 0', img: new Image() },
        'water': { src: 'Photoroom_20260309_185127.png', color: '0, 150, 255', img: new Image() },
        'air': { src: 'Photoroom_20260309_185127.png', color: '200, 200, 255', img: new Image() }
    };

    // تحميل الصور مسبقاً
    for (let key in elements) {
        elements[key].img.src = elements[key].src;
    }

    let particles = [];
    const elementKeys = Object.keys(elements);
    const handStates = {};

    class Particle {
        constructor(x, y, color, size) {
            this.x = x; this.y = y;
            this.size = size * (Math.random() * 0.5 + 0.5);
            this.speedX = (Math.random() - 0.5) * 10;
            this.speedY = (Math.random() - 0.5) * 10;
            this.color = color;
            this.life = 1.0;
        }
        update() {
            this.x += this.speedX; this.y += this.speedY;
            this.life -= 0.03;
        }
        draw() {
            canvasCtx.fillStyle = `rgba(${this.color}, ${this.life})`;
            canvasCtx.beginPath();
            canvasCtx.arc(this.x, this.y, Math.max(0, this.size), 0, Math.PI * 2);
            canvasCtx.fill();
        }
    }

    function onResults(results) {
        canvasElement.width = window.innerWidth;
        canvasElement.height = window.innerHeight;
        canvasCtx.save();
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

        if (results.multiHandLandmarks) {
            results.multiHandLandmarks.forEach((landmarks, index) => {
                if (!handStates[index]) {
                    handStates[index] = { currentElement: 'fire', lastRotation: 0 };
                }

                const wrist = landmarks[0];
                const middleRoot = landmarks[9];
                const thumbTip = landmarks[4];
                const indexTip = landmarks[8];
                
                const pinchDist = Math.hypot(thumbTip.x - indexTip.x, thumbTip.y - indexTip.y);
                const effectSize = pinchDist * 500;
                const angle = Math.atan2(middleRoot.y - wrist.y, middleRoot.x - wrist.x) * 180 / Math.PI;

                if (Math.abs(angle - handStates[index].lastRotation) > 50) {
                    const currentIdx = elementKeys.indexOf(handStates[index].currentElement);
                    handStates[index].currentElement = elementKeys[(currentIdx + 1) % elementKeys.length];
                    handStates[index].lastRotation = angle;
                }

                const centerX = middleRoot.x * canvasElement.width;
                const centerY = middleRoot.y * canvasElement.height;
                const currentData = elements[handStates[index].currentElement];

                // --- رسم صورة الـ PNG بدلاً من الايموجي ---
                if (currentData.img.complete) {
                    const imgSize = 80; // حجم الشعار
                    canvasCtx.save();
                    // نقل نقطة الرسم فوق اليد
                    canvasCtx.translate(centerX, centerY - 100);
                    // عكس الصورة أفقياً لأن الكانفاس مقلوب (ScaleX -1)
                    canvasCtx.scale(-1, 1);
                    // إضافة توهج خلف الصورة
                    canvasCtx.shadowBlur = 20;
                    canvasCtx.shadowColor = `rgb(${currentData.color})`;
                    // رسم الصورة (توسيطها)
                    canvasCtx.drawImage(currentData.img, -imgSize/2, -imgSize/2, imgSize, imgSize);
                    canvasCtx.restore();
                }

                for (let i = 0; i < 5; i++) {
                    particles.push(new Particle(centerX, centerY, currentData.color, effectSize));
                }
            });
        }

        particles = particles.filter(p => p.life > 0);
        particles.forEach(p => { p.update(); p.draw(); });
        canvasCtx.restore();
    }

    const hands = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
        maxNumHands: 4,
        modelComplexity: 1,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
    });

    hands.onResults(onResults);

    const camera = new Camera(videoElement, {
        onFrame: async () => { await hands.send({image: videoElement}); },
        width: 1280, height: 720
    });
    camera.start();
</script>
</body>
</html>
