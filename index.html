<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title> 🌈✨</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; transform: scaleX(-1); }
        video { display: none; }
        #ui-hint {
            position: absolute; top: 20px; width: 100%; text-align: center;
            color: white; font-family: sans-serif; z-index: 10; pointer-events: none;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

<div id="ui-hint">✨ افتح واغلق يدك للتحكم بالعناصر | المس الأعلى للتبديل بين القلم والممحاة ✨</div>

<video id="input_video"></video>
<canvas id="output_canvas"></canvas>

<script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');

    let allPaths = [];
    let particles = [];
    const handStates = {};
    let globalHue = 0;

    // إعداد العناصر وألوانها وتردداتها الموسيقية
    const elementsData = {
        'fire': { color: '255, 80, 0', notes: [261.63, 329.63, 392.00] }, // نغمات دافئة
        'water': { color: '0, 180, 255', notes: [440.00, 523.25, 659.25] }, // نغمات هادئة
        'air': { color: '180, 255, 200', notes: [783.99, 880.00, 1046.50] } // نغمات حادة
    };

    // نظام صوتي محسن (Web Audio API)
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playMagicSound(note) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        osc.type = 'sine'; // صوت ناعم جداً
        osc.frequency.setValueAtTime(note, audioCtx.currentTime);
        
        gain.gain.setValueAtTime(0, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime + 0.05);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.5);
        
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.start();
        osc.stop(audioCtx.currentTime + 0.5);
    }

    class MagicParticle {
        constructor(x, y, color, size) {
            this.x = x; this.y = y;
            this.size = size * (Math.random() * 0.5 + 0.5);
            this.speedX = (Math.random() - 0.5) * 10;
            this.speedY = (Math.random() - 0.5) * 10;
            this.color = color;
            this.life = 1.0;
        }
        update() {
            this.x += this.speedX; this.y += this.speedY;
            this.life -= 0.02;
        }
        draw() {
            canvasCtx.fillStyle = `rgba(${this.color}, ${this.life})`;
            canvasCtx.beginPath();
            canvasCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            canvasCtx.fill();
        }
    }

    function onResults(results) {
        canvasElement.width = window.innerWidth;
        canvasElement.height = window.innerHeight;
        canvasCtx.save();
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

        globalHue = (globalHue + 1) % 360;

        // رسم خطوط القلم السابقة
        allPaths.forEach(path => {
            canvasCtx.beginPath();
            canvasCtx.strokeStyle = path.color;
            canvasCtx.lineWidth = 10;
            canvasCtx.lineCap = 'round';
            canvasCtx.lineJoin = 'round';
            if (path.points.length > 0) {
                canvasCtx.moveTo(path.points[0].x, path.points[0].y);
                path.points.forEach(p => canvasCtx.lineTo(p.x, p.y));
            }
            canvasCtx.stroke();
        });

        if (results.multiHandLandmarks) {
            results.multiHandLandmarks.forEach((landmarks, index) => {
                const handId = index;
                if (!handStates[handId]) {
                    handStates[handId] = { mode: 'elements', currentElem: 'fire', isDrawing: false, lastSound: 0 };
                }
                const state = handStates[handId];

                // حساب نقطة المنتصف (كف اليد)
                const palmCenter = landmarks[9]; 
                const wrist = landmarks[0];
                const x = palmCenter.x * canvasElement.width;
                const y = palmCenter.y * canvasElement.height;

                // حساب حجم فتح اليد (المسافة بين الإبهام والخنصر)
                const handOpenness = Math.hypot(landmarks[4].x - landmarks[20].x, landmarks[4].y - landmarks[20].y);
                const dynamicSize = handOpenness * 300; // حجم العنصر بناءً على فتح اليد

                // تبديل الوضع (لمس أعلى الشاشة)
                if (y < 80) {
                    if (x < canvasElement.width / 3) state.mode = 'pen';
                    else if (x > canvasElement.width * 2/3) state.mode = 'elements';
                    else state.mode = 'eraser';
                }

                if (state.mode === 'elements') {
                    const data = elementsData[state.currentElem];
                    
                    // توهج في وسط اليد
                    const gradient = canvasCtx.createRadialGradient(x, y, 5, x, y, dynamicSize);
                    gradient.addColorStop(0, `rgba(${data.color}, 0.9)`);
                    gradient.addColorStop(1, `rgba(${data.color}, 0)`);
                    canvasCtx.fillStyle = gradient;
                    canvasCtx.beginPath();
                    canvasCtx.arc(x, y, dynamicSize, 0, Math.PI * 2);
                    canvasCtx.fill();

                    // إطلاق جسيمات عند فتح اليد بشكل واسع
                    if (handOpenness > 0.1) {
                        particles.push(new MagicParticle(x, y, data.color, dynamicSize / 10));
                        
                        // صوت موسيقي غير متكرر بجنون
                        const now = Date.now();
                        if (now - state.lastSound > 300) {
                            const randomNote = data.notes[Math.floor(Math.random() * data.notes.length)];
                            playMagicSound(randomNote);
                            state.lastSound = now;
                        }
                    }

                    // تبديل العنصر عن طريق تدوير اليد (ميلان المعصم)
                    const tilt = landmarks[9].x - landmarks[0].x;
                    if (tilt > 0.05) state.currentElem = 'fire';
                    else if (tilt < -0.05) state.currentElem = 'water';
                    else state.currentElem = 'air';

                } else if (state.mode === 'pen') {
                    // القلم يفعل عند تقريب السبابة من الإبهام
                    const isPinching = Math.hypot(landmarks[8].x - landmarks[4].x, landmarks[8].y - landmarks[4].y) < 0.04;
                    const penX = landmarks[8].x * canvasElement.width;
                    const penY = landmarks[8].y * canvasElement.height;

                    if (isPinching) {
                        if (!state.isDrawing) {
                            state.isDrawing = true;
                            allPaths.push({ color: `hsl(${globalHue}, 100%, 50%)`, points: [{x: penX, y: penY}] });
                            state.pathIdx = allPaths.length - 1;
                        } else {
                            allPaths[state.pathIdx].points.push({x: penX, y: penY});
                        }
                    } else { state.isDrawing = false; }
                    canvasCtx.fillText("✏️", penX - 20, penY - 20);

                } else if (state.mode === 'eraser') {
                    const isPinching = Math.hypot(landmarks[8].x - landmarks[4].x, landmarks[8].y - landmarks[4].y) < 0.05;
                    const eraX = landmarks[8].x * canvasElement.width;
                    const eraY = landmarks[8].y * canvasElement.height;

                    if (isPinching) {
                        let splitPaths = [];
                        allPaths.forEach(path => {
                            let segment = [];
                            path.points.forEach(p => {
                                if (Math.hypot(p.x - eraX, p.y - eraY) > 40) {
                                    segment.push(p);
                                } else {
                                    if (segment.length > 1) splitPaths.push({color: path.color, points: segment});
                                    segment = [];
                                }
                            });
                            if (segment.length > 1) splitPaths.push({color: path.color, points: segment});
                        });
                        allPaths = splitPaths;
                    }
                    canvasCtx.fillText("🧽", eraX - 20, eraY - 20);
                }
            });
        }

        // تحديث ورسم الجسيمات
        particles = particles.filter(p => p.life > 0);
        particles.forEach(p => { p.update(); p.draw(); });
        canvasCtx.restore();
    }

    const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
    hands.setOptions({ maxNumHands: 10, modelComplexity: 1, minDetectionConfidence: 0.7 });
    hands.onResults(onResults);

    new Camera(videoElement, {
        onFrame: async () => { await hands.send({image: videoElement}); },
        width: 1280, height: 720
    }).start();
</script>
</body>
</html>
