<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحدي أحجية اليدين - لاعبين</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #1a1a1a;
            color: white;
            font-family: sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100-vh;
        }

        #container {
            display: flex;
            flex: 1;
            position: relative;
        }

        .player-side {
            flex: 1;
            border: 2px solid #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        #p1-side { border-left: 2px solid #ff4757; }
        #p2-side { border-right: 2px solid #2ed573; }

        canvas {
            max-width: 90%;
            background: #000;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        #video-container {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 150px;
            border: 2px solid #fff;
            z-index: 10;
            background: #000;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .controls {
            padding: 10px;
            text-align: center;
            background: #222;
        }

        button {
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
            background: #ff4757;
            color: white;
            border: none;
            border-radius: 5px;
        }

        .status {
            position: absolute;
            top: 20px;
            font-weight: bold;
            font-size: 24px;
        }
    </style>
</head>
<body>

<div class="controls">
    <button onclick="startGame()">التقط الصورة وابدأ التحدي!</button>
    <div id="game-status">بانتظار الكاميرا...</div>
</div>

<div id="container">
    <div id="p1-side" class="player-side">
        <div class="status">لاعب 1 (يسار)</div>
        <canvas id="canvas1"></canvas>
    </div>
    
    <div id="p2-side" class="player-side">
        <div class="status">لاعب 2 (يمين)</div>
        <canvas id="canvas2"></canvas>
    </div>

    <div id="video-container">
        <video id="input_video"></video>
        <canvas id="debug_canvas" style="display:none"></canvas>
    </div>
</div>

<script>
    const videoElement = document.getElementById('input_video');
    const canvas1 = document.getElementById('canvas1');
    const canvas2 = document.getElementById('canvas2');
    const ctx1 = canvas1.getContext('2d');
    const ctx2 = canvas2.getContext('2d');

    let pieces = [];
    let gameActive = false;
    let grabbedPiece = { player1: null, player2: null };
    let puzzleImage = null;

    // إعدادات الأحجية
    const grid = 3;
    const size = 300;
    canvas1.width = canvas2.width = size;
    canvas1.height = canvas2.height = size;

    function startGame() {
        // التقاط فريم من الفيديو كصورة للعبة
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = videoElement.videoWidth;
        tempCanvas.height = videoElement.videoHeight;
        const tempCtx = tempCanvas.getContext('2d');
        tempCtx.drawImage(videoElement, 0, 0);
        
        puzzleImage = new Image();
        puzzleImage.src = tempCanvas.toDataURL();
        
        puzzleImage.onload = () => {
            initPuzzle();
            gameActive = true;
            document.getElementById('game-status').innerText = "اللعبة بدأت! استعمل يدك للتحريك";
        };
    }

    function initPuzzle() {
        pieces = [];
        const pSize = size / grid;
        for (let r = 0; r < grid; r++) {
            for (let c = 0; c < grid; c++) {
                const piece = {
                    id: r * grid + c,
                    sx: c * (puzzleImage.width / grid),
                    sy: r * (puzzleImage.height / grid),
                    sw: puzzleImage.width / grid,
                    sh: puzzleImage.height / grid,
                    // مواقع عشوائية للاعبين
                    p1: { x: Math.random() * (size - pSize), y: Math.random() * (size - pSize) },
                    p2: { x: Math.random() * (size - pSize), y: Math.random() * (size - pSize) },
                    correctX: c * pSize,
                    correctY: r * pSize
                };
                pieces.push(piece);
            }
        }
    }

    function onResults(results) {
        if (!gameActive) return;

        // مسح الكانفاس للرسم الجديد
        ctx1.clearRect(0, 0, size, size);
        ctx2.clearRect(0, 0, size, size);

        // رسم القطع
        pieces.forEach(p => {
            const pSize = size / grid;
            // رسم للاعب 1
            ctx1.drawImage(puzzleImage, p.sx, p.sy, p.sw, p.sh, p.p1.x, p.p1.y, pSize, pSize);
            // رسم للاعب 2
            ctx2.drawImage(puzzleImage, p.sx, p.sy, p.sw, p.sh, p.p2.x, p.p2.y, pSize, pSize);
        });

        if (results.multiHandLandmarks) {
            results.multiHandLandmarks.forEach((landmarks, index) => {
                const thumb = landmarks[4];
                const indexF = landmarks[8];
                
                // حساب المسافة بين الإبهام والسبابة (Pinch)
                const dist = Math.hypot(thumb.x - indexF.x, thumb.y - indexF.y);
                const isPinching = dist < 0.05;

                // تحويل إحداثيات MediaPipe (0-1) إلى بكسل الكانفاس
                // ملاحظة: قمنا بعكس X لأن الكاميرا تظهر كمرآة
                const handX = (1 - indexF.x) * size; 
                const handY = indexF.y * size;

                // تحديد اللاعب (يسار الكاميرا هو يمين الشاشة والعكس)
                const player = indexF.x > 0.5 ? "player1" : "player2";
                const currentCtx = player === "player1" ? ctx1 : ctx2;

                // رسم مؤشر لليد
                currentCtx.fillStyle = isPinching ? "red" : "yellow";
                currentCtx.beginPath();
                currentCtx.arc(handX, handY, 10, 0, Math.PI * 2);
                currentCtx.fill();

                if (isPinching) {
                    if (!grabbedPiece[player]) {
                        // محاولة إمساك قطعة
                        pieces.forEach(p => {
                            const pos = p[player === "player1" ? "p1" : "p2"];
                            if (handX > pos.x && handX < pos.x + (size/grid) && 
                                handY > pos.y && handY < pos.y + (size/grid)) {
                                grabbedPiece[player] = p;
                            }
                        });
                    } else {
                        // تحريك القطعة الممسوكة
                        const pSize = size / grid;
                        grabbedPiece[player][player === "player1" ? "p1" : "p2"] = {
                            x: handX - pSize / 2,
                            y: handY - pSize / 2
                        };
                    }
                } else {
                    grabbedPiece[player] = null;
                }
            });
        }
        checkWin();
    }

    function checkWin() {
        const threshold = 20;
        let p1Win = pieces.every(p => Math.hypot(p.p1.x - p.correctX, p.p1.y - p.correctY) < threshold);
        let p2Win = pieces.every(p => Math.hypot(p.p2.x - p.correctX, p.p2.y - p.correctY) < threshold);

        if (p1Win || p2Win) {
            gameActive = false;
            alert(p1Win ? "مبروك للاعب 1 الفوز!" : "مبروك للاعب 2 الفوز!");
        }
    }

    const hands = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
        maxNumHands: 2,
        modelComplexity: 1,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
    });

    hands.onResults(onResults);

    const camera = new Camera(videoElement, {
        onFrame: async () => {
            await hands.send({image: videoElement});
        },
        width: 640,
        height: 480
    });
    camera.start();

</script>
</body>
</html>
