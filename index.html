<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>المختبر السحري - إصلاح التحكم الكامل ✨</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; position: fixed; width: 100vw; height: 100vh; }
        
        /* الكانفاس الرئيسي الذي يظهر عليه كل شيء */
        #main_canvas {
            width: 100%;
            height: 100%;
            transform: scaleX(-1); /* مرآة */
        }

        video { display: none; }
        
        #toolbar {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; z-index: 100; background: rgba(255,255,255,0.1);
            padding: 10px; border-radius: 50px; backdrop-filter: blur(5px);
        }
        .tool { 
            font-size: 24px; width: 50px; height: 50px; 
            display: flex; align-items: center; justify-content: center; 
            border-radius: 50%; color: white; border: 2px solid white;
        }
        .active { background: white; color: black; box-shadow: 0 0 15px white; }
    </style>
</head>
<body>

<div id="toolbar">
    <div id="eraser-btn" class="tool">🧼</div>
    <div id="element-btn" class="tool active">🪄</div>
    <div id="pen-btn" class="tool">✏️</div>
</div>

<video id="input_video" playsinline></video>
<canvas id="main_canvas"></canvas>

<script>
    const videoElement = document.getElementById('input_video');
    const canvas = document.getElementById('main_canvas');
    const ctx = canvas.getContext('2d');

    // طبقة رسم مخفية (Buffer) لمنع مسح الكاميرا
    const drawLayer = document.createElement('canvas');
    const dctx = drawLayer.getContext('2d');

    const elements = {
        'fire': { src: 'Photoroom_20260309_185127.png', color: '255,100,0', img: new Image() },
        'water': { src: 'Photoroom_20260309_185127.png', color: '0,150,255', img: new Image() },
        'air': { src: 'Photoroom_20260309_185127.png', color: '150,255,150', img: new Image() }
    };
    for(let k in elements) elements[k].img.src = elements[k].src;

    let mode = 'element'; // eraser, element, pen
    let hue = 0;
    let handStates = {};
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playNote(f) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.type = 'sine'; o.frequency.value = f;
        o.connect(g); g.connect(audioCtx.destination);
        g.gain.setValueAtTime(0.05, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
        o.start(); o.stop(audioCtx.currentTime + 0.1);
    }

    function onResults(results) {
        // توحيد المقاسات
        if (canvas.width !== window.innerWidth) {
            canvas.width = drawLayer.width = window.innerWidth;
            canvas.height = drawLayer.height = window.innerHeight;
        }

        ctx.save();
        ctx.clearRect(0,0,canvas.width, canvas.height);
        
        // 1. رسم الكاميرا أولاً كخلفية
        ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);

        if (results.multiHandLandmarks) {
            results.multiHandLandmarks.forEach((marks, i) => {
                if(!handStates[i]) handStates[i] = { el: 'fire', lastX:null, lastY:null, rot:0 };

                const indexTip = marks[8];
                const thumbTip = marks[4];
                const wrist = marks[0];
                const palm = marks[9];

                const x = indexTip.x * canvas.width;
                const y = indexTip.y * canvas.height;

                // حساب المسافة بين الإبهام والسبابة (القرص)
                const dist = Math.sqrt(Math.pow(indexTip.x - thumbTip.x, 2) + Math.pow(indexTip.y - thumbTip.y, 2));
                const pinching = dist < 0.06;

                // --- اختيار الأدوات (أعلى الشاشة) ---
                if (y < 100 && pinching) {
                    if (x < canvas.width * 0.35) mode = 'eraser';
                    else if (x > canvas.width * 0.65) mode = 'pen';
                    else mode = 'element';
                    
                    document.querySelectorAll('.tool').forEach(t => t.classList.remove('active'));
                    document.getElementById(mode+'-btn').classList.add('active');
                }

                // --- تبديل العناصر (تدوير اليد) ---
                const currentRot = Math.atan2(palm.y - wrist.y, palm.x - wrist.x);
                if (Math.abs(currentRot - handStates[i].rot) > 0.8) {
                    const keys = Object.keys(elements);
                    handStates[i].el = keys[(keys.indexOf(handStates[i].el)+1)%3];
                    handStates[i].rot = currentRot;
                    playNote(400 + (keys.indexOf(handStates[i].el)*200));
                }

                // --- تنفيذ الرسم أو المسح ---
                if (pinching) {
                    dctx.lineCap = 'round';
                    dctx.lineJoin = 'round';
                    if (mode === 'pen') {
                        dctx.globalCompositeOperation = 'source-over';
                        dctx.strokeStyle = `hsl(${hue}, 100%, 50%)`;
                        dctx.lineWidth = 12;
                        if(handStates[i].lastX) {
                            dctx.beginPath();
                            dctx.moveTo(handStates[i].lastX, handStates[i].lastY);
                            dctx.lineTo(x, y);
                            dctx.stroke();
                        }
                        hue = (hue + 5) % 360;
                    } else if (mode === 'eraser') {
                        dctx.globalCompositeOperation = 'destination-out';
                        dctx.lineWidth = 80;
                        if(handStates[i].lastX) {
                            dctx.beginPath();
                            dctx.moveTo(handStates[i].lastX, handStates[i].lastY);
                            dctx.lineTo(x, y);
                            dctx.stroke();
                        }
                    }
                    handStates[i].lastX = x;
                    handStates[i].lastY = y;
                } else {
                    handStates[i].lastX = null;
                }

                // --- رسم المؤثر (الصورة) ---
                ctx.save();
                ctx.translate(x, y - 50);
                ctx.scale(-1, 1); // تصحيح اتجاه الصورة داخل الكانفاس المقلوب
                if (elements[handStates[i].el].img.complete) {
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = `rgb(${elements[handStates[i].el].color})`;
                    ctx.drawImage(elements[handStates[i].el].img, -40, -40, 80, 80);
                }
                ctx.restore();
            });
        }

        // 2. دمج طبقة الرسم فوق الكاميرا
        ctx.drawImage(drawLayer, 0, 0);
        ctx.restore();
    }

    const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
    hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.75, minTrackingConfidence: 0.75 });
    hands.onResults(onResults);

    const camera = new Camera(videoElement, {
        onFrame: async () => { await hands.send({image: videoElement}); },
        width: 640, height: 480 // سرعة أفضل في المعالجة
    });
    camera.start();

    window.addEventListener('resize', () => {
        canvas.width = drawLayer.width = window.innerWidth;
        canvas.height = drawLayer.height = window.innerHeight;
    });
</script>
</body>
</html>
