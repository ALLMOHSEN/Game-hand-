<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تحكم العناصر - شعارات ذكية</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; transform: scaleX(-1); }
        video { display: none; }
        /* إخفاء واجهة المستخدم القديمة وجعلها بسيطة */
        #hint-overlay {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            color: rgba(255,255,255,0.7); text-align: center; z-index: 10;
            background: rgba(0,0,0,0.3); padding: 8px 15px; border-radius: 50px;
            font-size: 13px; pointer-events: none; border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

<div id="hint-overlay">قم بتدوير يدك لتغيير شعار العنصر 🔥 💧 💨</div>

<video id="input_video"></video>
<canvas id="output_canvas"></canvas>

<script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');

    let particles = [];
    const elements = {
        'fire': { emoji: '🔥', color: '255, 100, 0' },
        'water': { emoji: '💧', color: '0, 150, 255' },
        'air': { emoji: '💨', color: '200, 200, 255' }
    };
    const elementKeys = Object.keys(elements);
    const handStates = {};

    // نظام الصوت
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playEffectSound(type, size) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.type = type === 'fire' ? 'sawtooth' : type === 'water' ? 'sine' : 'triangle';
        osc.frequency.setValueAtTime(size * 4, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.03, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }

    class Particle {
        constructor(x, y, color, size) {
            this.x = x; this.y = y;
            this.size = size * (Math.random() * 0.6 + 0.4);
            this.speedX = (Math.random() - 0.5) * 8;
            this.speedY = (Math.random() - 0.5) * 8;
            this.color = color;
            this.life = 1.0;
        }
        update() {
            this.x += this.speedX; this.y += this.speedY;
            this.life -= 0.025;
        }
        draw() {
            canvasCtx.fillStyle = `rgba(${this.color}, ${this.life})`;
            canvasCtx.beginPath();
            canvasCtx.arc(this.x, this.y, Math.max(0, this.size), 0, Math.PI * 2);
            canvasCtx.fill();
        }
    }

    function onResults(results) {
        canvasElement.width = window.innerWidth;
        canvasElement.height = window.innerHeight;
        canvasCtx.save();
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        
        // رسم الكاميرا
        canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

        if (results.multiHandLandmarks) {
            results.multiHandLandmarks.forEach((landmarks, index) => {
                if (!handStates[index]) {
                    handStates[index] = { currentElement: 'fire', lastRotation: 0 };
                }

                const wrist = landmarks[0];
                const middleRoot = landmarks[9];
                const thumbTip = landmarks[4];
                const indexTip = landmarks[8];
                
                // حساب الحجم والدوران
                const pinchDist = Math.hypot(thumbTip.x - indexTip.x, thumbTip.y - indexTip.y);
                const effectSize = pinchDist * 550;
                const angle = Math.atan2(middleRoot.y - wrist.y, middleRoot.x - wrist.x) * 180 / Math.PI;

                // تغيير العنصر عند لف اليد
                if (Math.abs(angle - handStates[index].lastRotation) > 45) {
                    const currentIdx = elementKeys.indexOf(handStates[index].currentElement);
                    handStates[index].currentElement = elementKeys[(currentIdx + 1) % elementKeys.length];
                    handStates[index].lastRotation = angle;
                }

                const centerX = middleRoot.x * canvasElement.width;
                const centerY = middleRoot.y * canvasElement.height;
                const currentEl = elements[handStates[index].currentElement];

                // 1. رسم "الشعار" (الرمز) فوق اليد
                canvasCtx.save();
                canvasCtx.translate(centerX, centerY - 80); // إزاحة للأعلى قليلاً عن اليد
                canvasCtx.scale(-1, 1); // تصحيح اتجاه الرمز لأن الكاميرا مقلوبة
                canvasCtx.font = "40px Arial";
                canvasCtx.textAlign = "center";
                // إضافة توهج خلف الشعار
                canvasCtx.shadowBlur = 15;
                canvasCtx.shadowColor = `rgb(${currentEl.color})`;
                canvasCtx.fillText(currentEl.emoji, 0, 0);
                canvasCtx.restore();

                // 2. توليد الجسيمات
                for (let i = 0; i < 5; i++) {
                    particles.push(new Particle(centerX, centerY, currentEl.color, effectSize));
                }
                
                playEffectSound(handStates[index].currentElement, effectSize);
            });
        }

        // تحديث ورسم الجسيمات
        particles = particles.filter(p => p.life > 0);
        particles.forEach(p => { p.update(); p.draw(); });

        canvasCtx.restore();
    }

    const hands = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
        maxNumHands: 4, 
        modelComplexity: 1,
        minDetectionConfidence: 0.6,
        minTrackingConfidence: 0.6
    });

    hands.onResults(onResults);

    const camera = new Camera(videoElement, {
        onFrame: async () => { await hands.send({image: videoElement}); },
        width: 1280, height: 720
    });
    camera.start();
</script>
</body>
</html>
