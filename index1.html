<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تحكم العناصر الخارق - AR</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; transform: scaleX(-1); }
        video { display: none; }
        #ui {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            color: white; text-align: center; z-index: 10; pointer-events: none;
            background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 20px;
        }
        .hint { font-size: 14px; color: #aaa; margin-top: 5px; }
    </style>
</head>
<body>

<div id="ui">
    <div id="mode-text">نمط العنصر: نار 🔥</div>
    <div class="hint">فر يدك لتغيير العنصر | افتح يدك لتكبيره | اغلقها لتصغيره</div>
</div>

<video id="input_video"></video>
<canvas id="output_canvas"></canvas>

<script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const modeText = document.getElementById('mode-text');

    let particles = [];
    let currentElement = 'fire'; // fire, water, air
    const elements = ['fire', 'water', 'air'];
    let lastRotation = 0;

    // إعدادات الصوت (Web Audio API)
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playEffectSound(type, size) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        if (type === 'fire') osc.type = 'sawtooth';
        else if (type === 'water') osc.type = 'sine';
        else osc.type = 'triangle';

        osc.frequency.setValueAtTime(size * 10, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        
        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
    }

    class Particle {
        constructor(x, y, color, size) {
            this.x = x; this.y = y;
            this.size = size * (Math.random() * 0.5 + 0.5);
            this.speedX = (Math.random() - 0.5) * 5;
            this.speedY = (Math.random() - 0.5) * 5;
            this.color = color;
            this.life = 1.0;
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            this.life -= 0.02;
            if (this.size > 0.2) this.size -= 0.1;
        }
        draw() {
            canvasCtx.fillStyle = this.color.replace('opacity', this.life);
            canvasCtx.beginPath();
            canvasCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            canvasCtx.fill();
        }
    }

    function onResults(results) {
        canvasElement.width = window.innerWidth;
        canvasElement.height = window.innerHeight;
        
        canvasCtx.save();
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        
        // رسم الكاميرا كخلفية
        canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

        if (results.multiHandLandmarks) {
            for (const landmarks of results.multiHandLandmarks) {
                // 1. حساب المسافة بين الإبهام والسبابة (للحجم)
                const thumb = landmarks[4];
                const index = landmarks[8];
                const wrist = landmarks[0];
                const middle = landmarks[12];
                
                const pinchDist = Math.hypot(thumb.x - index.x, thumb.y - index.y);
                const effectSize = pinchDist * 500; // حجم المؤثر

                // 2. حساب الدوران (زاوية المعصم بالنسبة للإصبع الأوسط) لتبديل العناصر
                const angle = Math.atan2(middle.y - wrist.y, middle.x - wrist.x) * 180 / Math.PI;
                if (Math.abs(angle - lastRotation) > 40) {
                    const idx = elements.indexOf(currentElement);
                    currentElement = elements[(idx + 1) % elements.length];
                    modeText.innerText = `نمط العنصر: ${currentElement === 'fire' ? 'نار 🔥' : currentElement === 'water' ? 'ماء 💧' : 'هواء 💨'}`;
                    lastRotation = angle;
                }

                // 3. توليد جسيمات عند كف اليد
                const centerX = middle.x * canvasElement.width;
                const centerY = middle.y * canvasElement.height;

                let color;
                if (currentElement === 'fire') color = `rgba(255, ${Math.random()*100}, 0, opacity)`;
                else if (currentElement === 'water') color = `rgba(0, ${Math.random()*150+100}, 255, opacity)`;
                else color = `rgba(200, 200, 200, opacity)`;

                for (let i = 0; i < 5; i++) {
                    particles.push(new Particle(centerX, centerY, color, effectSize));
                }
                
                if (audioCtx.state === 'suspended') audioCtx.resume();
                playEffectSound(currentElement, effectSize);
            }
        }

        // تحديث ورسم الجسيمات
        particles = particles.filter(p => p.life > 0);
        particles.forEach(p => {
            p.update();
            p.draw();
        });

        canvasCtx.restore();
    }

    const hands = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });
    hands.setOptions({
        maxNumHands: 1,
        modelComplexity: 1,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
    });
    hands.onResults(onResults);

    const camera = new Camera(videoElement, {
        onFrame: async () => { await hands.send({image: videoElement}); },
        width: 1280, height: 720
    });
    camera.start();

    window.addEventListener('resize', () => {
        canvasElement.width = window.innerWidth;
        canvasElement.height = window.innerHeight;
    });
</script>
</body>
</html>
